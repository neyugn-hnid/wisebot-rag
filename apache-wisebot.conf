<VirtualHost *:80>
    ServerName wisebot.qzz.io

    DocumentRoot "C:/Users/VanDinh/OneDrive/Máy tính/ĐATN/frontend/dist"
    DirectoryIndex index.html

    <Directory "C:/Users/VanDinh/OneDrive/Máy tính/ĐATN/frontend/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        RewriteRule ^ index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass "/api/" "http://127.0.0.1:9000/api/"
    ProxyPassReverse "/api/" "http://127.0.0.1:9000/api/"

    ProxyPass "/ws/" "ws://127.0.0.1:9000/ws/"
    ProxyPassReverse "/ws/" "ws://127.0.0.1:9000/ws/"

    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
    </IfModule>

    ErrorLog "logs/wisebot-error.log"
    CustomLog "logs/wisebot-access.log" common
</VirtualHost>
