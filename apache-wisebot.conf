<VirtualHost *:80>
    ServerName wisebot.qzz.io
    ServerAlias localhost 127.0.0.1

    DocumentRoot "C:/xampp/htdocs/wisebot"

    <Directory "C:/xampp/htdocs/wisebot">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass "/api/" "http://127.0.0.1:9000/api/" flushpackets=on
    ProxyPassReverse "/api/" "http://127.0.0.1:9000/api/"

    ProxyPass "/ws/" "ws://127.0.0.1:9000/ws/"
    ProxyPassReverse "/ws/" "ws://127.0.0.1:9000/ws/"

    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
    </IfModule>

    ErrorLog "logs/wisebot-error.log"
    CustomLog "logs/wisebot-access.log" common
</VirtualHost>
