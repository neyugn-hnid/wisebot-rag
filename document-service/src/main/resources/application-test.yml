spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/wisebot_document_database_test
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 0

storage:
  enabled: false
  base-path: ${STORAGE_BASE_PATH:./build/test-uploads}

chunking:
  chunk-size: 800
  overlap: 120

embedding:
  base-url: ${EMBEDDING_BASE_URL:http://localhost:8083}
  path: /embed
