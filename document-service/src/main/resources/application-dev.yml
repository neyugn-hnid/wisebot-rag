spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/wisebot_document_database
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8081

storage:
  enabled: true
  base-path: ${STORAGE_BASE_PATH:./data/uploads}

embedding:
  base-url: ${EMBEDDING_BASE_URL:http://localhost:8001}
  path: /embed

billing:
  base-url: ${BILLING_BASE_URL:http://localhost:8085}
  internal-api-key: ${INTERNAL_API_KEY:wisebot-internal-key}

