spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/wisebot_document_database
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8081}

storage:
  enabled: true
  base-path: ${STORAGE_BASE_PATH:/var/lib/wisebot/documents}

chunking:
  chunk-size: 800
  overlap: 120

embedding:
  base-url: ${EMBEDDING_BASE_URL}
  path: /embed
