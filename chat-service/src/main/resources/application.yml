server:
  port: 8082
  compression:
    enabled: true
    mime-types: application/json

spring:
  application:
    name: chat-service
  profiles:
    active: @spring.profiles.active@

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

integration:
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://localhost:8001}
    search-path: /v1/search
    provider-path: /v1/provider
    service-token: ${EMBEDDING_SERVICE_TOKEN:}
  ai:
    base-url: ${AI_BASE_URL:http://localhost:8002}
    stream-path: /v1/rag/stream
    provider-path: /v1/provider
    service-token: ${AI_SERVICE_TOKEN:}
  document:
    base-url: ${DOCUMENT_BASE_URL:http://localhost:8081}
    knowledge-bases-path: /knowledge-bases

widget:
  base-url: ${WIDGET_BASE_URL:http://localhost:8084}

chat:
  retention:
    cleanup-enabled: ${CHAT_RETENTION_CLEANUP_ENABLED:true}
    widget-session-days: ${CHAT_RETENTION_WIDGET_SESSION_DAYS:90}
    batch-size: ${CHAT_RETENTION_BATCH_SIZE:500}
    cleanup-initial-delay-ms: ${CHAT_RETENTION_INITIAL_DELAY_MS:300000}
    cleanup-fixed-delay-ms: ${CHAT_RETENTION_FIXED_DELAY_MS:86400000}

realtime:
  websocket-endpoint: /ws/chat
  app-prefix: /app
  topic-prefix: /topic

jwt:
  secret: ${JWT_SECRET:VYW20sDO+am1aOTsq/4Tn48CZ6oEV13ooo51rDrz7AI=}
