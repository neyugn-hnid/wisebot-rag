server:
  port: 8082
  compression:
    enabled: true
    mime-types: application/json

spring:
  application:
    name: chat-service
  profiles:
    active: @spring.profiles.active@

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

integration:
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://localhost:8001}
    search-path: /v1/search
    service-token: ${EMBEDDING_SERVICE_TOKEN:}
  ai:
    base-url: ${AI_BASE_URL:http://localhost:8002}
    ask-path: /v1/rag/ask
    stream-path: /v1/rag/stream
    provider-path: /v1/provider
    service-token: ${AI_SERVICE_TOKEN:}
  document:
    base-url: ${DOCUMENT_BASE_URL:http://localhost:8081}
    knowledge-bases-path: /knowledge-bases

realtime:
  websocket-endpoint: /ws/chat
  app-prefix: /app
  topic-prefix: /topic
