spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/wisebot_billing_database
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: billing_service
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    schemas: billing_service

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:YOUR_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET:YOUR_HASH_SECRET}
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${VNPAY_RETURN_URL:http://localhost:5173/billing?vnpay_return=true}

internal:
  api-key: ${INTERNAL_API_KEY:wisebot-internal-key}

vietqr:
  bank-code: ${VIETQR_BANK_CODE:970422}
  account-no: ${VIETQR_ACCOUNT_NO:}
  account-name: ${VIETQR_ACCOUNT_NAME:}
  template: qr_only
