server:
  port: 8080

spring:
  application:
    name: user-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:wisebot_user_database}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  sendGrid:
    apiKey: ${SENDGRID_API_KEY}
    fromEmail: ${SENDGRID_FROM_EMAIL:deannguyen.ptho@gmail.com}
    templateId: ${SENDGRID_TEMPLATE_ID:d-0cad2bac5e0048d183c73a0a9b75d5d8}
    verificationLink: ${SENDGRID_VERIFICATION_LINK:http://localhost:3000/verify-email?token={token}}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        cache:
          use_second_level_cache: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true
    out-of-order: false

  cache:
    type: simple

  devtools:
    add-properties: true

jwt:
  expiryMinutes: ${JWT_EXPIRY_MINUTES:60}
  expiryDay: ${JWT_EXPIRY_DAY:14}
  accessKey: ${JWT_ACCESS_KEY:VYW20sDO+am1aOTsq/4Tn48CZ6oEV13ooo51rDrz7AI=}
  refreshKey: ${JWT_REFRESH_KEY:UYDDaHfHJxiTtOfyGkRbae6KlWwufFFvxA04gh/9uZI=}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

openapi:
  service:
    api-docs: user-service
    server: ${BACKEND_HOST:http://localhost:${server.port}}
    title: User Service API
    description: API documentation for User Service
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

app:
  features:
    jwt-blacklist:
      enabled: true
      prefix: "jwt:bl:"
    rate-limit:
      enabled: true
      limit: 100
      window-seconds: 60
      prefix: "rate:ip:"
    audit:
      enabled: false
      db-enabled: false
      max-length: 10000
      batch-size: 200
      poll-interval-ms: 1000
    cache:
      enabled: true
      default-ttl: 10m
      ttl-by-cache:
        user-by-id: 5m
    mail:
      enabled: ${MAIL_ENABLED:false}
      from: ${MAIL_FROM:no-reply@wisebot.local}
      app-name: ${MAIL_APP_NAME:WiseBot}
      invite-base-url: ${MAIL_INVITE_BASE_URL:http://localhost:3000}
      invite-path: ${MAIL_INVITE_PATH:/register}
      sendgrid-api-key: ${SENDGRID_API_KEY:}