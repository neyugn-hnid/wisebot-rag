spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    show-sql: false

logging:
  level:
    root: WARN

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false